<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页码配置测试</title>
    <script type="module">
      // 导入 SDK（通过 link 的本地版本）
      import { createPrintEngine } from "../sdk/dist/index.esm.js"

      // 测试模板：启用页码配置
      const template = {
        id: "test-page-number",
        name: "页码测试模板",
        version: "1.0.1",
        schemaId: "test",
        layoutMode: "absolute",
        page: {
          size: "A4",
          orientation: "portrait",
          marginMm: { top: 15, right: 15, bottom: 15, left: 15 },
          // 页码配置
          pageNumber: {
            enabled: true,
            position: "bottom-right",
            format: "slash",
            style: {
              fontSize: 14,
              color: "#333",
              fontWeight: "bold",
            },
          },
        },
        components: [
          {
            id: "title",
            type: "text",
            layout: { mode: "absolute", xMm: 15, yMm: 20, widthMm: 180, heightMm: 10 },
            style: { fontSize: 24, fontWeight: "bold", color: "#000" },
            props: { text: "页码配置测试" },
          },
          {
            id: "content1",
            type: "text",
            layout: { mode: "absolute", xMm: 15, yMm: 40, widthMm: 180, heightMm: 100 },
            style: { fontSize: 14 },
            props: { text: "第一页内容：这是一个测试页码配置的模板。页码应该显示在右下角，格式为 1/3。" },
          },
          {
            id: "content2",
            type: "text",
            layout: { mode: "absolute", xMm: 15, yMm: 150, widthMm: 180, heightMm: 100 },
            style: { fontSize: 14 },
            props: { text: "第二页内容：页码会自动更新为 2/3。" },
          },
          {
            id: "content3",
            type: "text",
            layout: { mode: "absolute", xMm: 15, yMm: 260, widthMm: 180, heightMm: 20 },
            style: { fontSize: 14 },
            props: { text: "第三页内容：页码应该是 3/3。" },
          },
        ],
      }

      // 测试数据
      const data = {}

      // 生成打印HTML
      window.addEventListener("DOMContentLoaded", () => {
        try {
          console.log("开始测试页码配置...")
          const engine = createPrintEngine(template, data)
          const html = engine.generatePrintHTML()

          // 写入iframe
          const iframe = document.getElementById("preview")
          const iframeDoc = iframe.contentWindow.document
          iframeDoc.open()
          iframeDoc.write(html)
          iframeDoc.close()

          console.log("✅ 页码配置测试成功！")
          console.log("请检查每一页右下角是否有页码显示")
        } catch (error) {
          console.error("❌ 页码配置测试失败：", error)
          document.getElementById("error").textContent = error.message
        }
      })
    </script>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      h1 {
        margin-bottom: 20px;
      }
      #error {
        color: red;
        margin-bottom: 20px;
      }
      iframe {
        width: 100%;
        height: 80vh;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>📄 页码配置测试</h1>
    <div id="error"></div>
    <iframe id="preview"></iframe>
  </body>
</html>
